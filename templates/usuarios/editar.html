{% extends "base.html" %}

{% block title %}Editar Usuario{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h1><i class="fas fa-user-edit"></i> Editar Usuario</h1>
    </div>
    <div class="col text-end">
        <a href="{{ url_for('usuarios.lista') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="nombre_usuario" class="form-label">Nombre de Usuario *</label>
                    <input type="text" class="form-control" id="nombre_usuario" name="nombre_usuario" 
                           value="{{ usuario[1] }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="nombre_completo" class="form-label">Nombre Completo *</label>
                    <input type="text" class="form-control" id="nombre_completo" name="nombre_completo" 
                           value="{{ usuario[2] }}" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" name="email" 
                       value="{{ usuario[3] }}" required>
            </div>
            
            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i> Deja los campos de contraseña en blanco para mantener la actual.
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="contraseña" class="form-label">Nueva Contraseña</label>
                    <input type="password" class="form-control" id="contraseña" name="contraseña">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="confirmar_contraseña" class="form-label">Confirmar Nueva Contraseña</label>
                    <input type="password" class="form-control" id="confirmar_contraseña" name="confirmar_contraseña">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="rol" class="form-label">Rol *</label>
                <select class="form-select" id="rol" name="rol" required>
                    <option value="vendedor" {% if usuario[4] == 'vendedor' %}selected{% endif %}>Vendedor</option>
                    <option value="admin" {% if usuario[4] == 'admin' %}selected{% endif %}>Administrador</option>
                    <option value="supervisor" {% if usuario[4] == 'supervisor' %}selected{% endif %}>Supervisor</option>
                </select>
            </div>
            
            <div class="text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Actualizar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
