{% extends "base.html" %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h1><i class="fas fa-user"></i> Mi Perfil</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5>Información Personal</h5>
            </div>
            <div class="card-body">
                <table class="table table-sm">
                    <tr>
                        <th>Usuario:</th>
                        <td>{{ usuario.nombre_usuario }}</td>
                    </tr>
                    <tr>
                        <th>Nombre completo:</th>
                        <td>{{ usuario.nombre_completo }}</td>
                    </tr>
                    <tr>
                        <th>Email:</th>
                        <td>{{ usuario.email }}</td>
                    </tr>
                    <tr>
                        <th>Rol:</th>
                        <td>
                            <span class="badge bg-info">{{ usuario.rol }}</span>
                        </td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header">
                <h5>Cambiar Contraseña</h5>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('auth.cambiar_contraseña') }}">
                    <div class="mb-3">
                        <label for="contraseña_actual" class="form-label">Contraseña Actual</label>
                        <input type="password" class="form-control" id="contraseña_actual" name="contraseña_actual" required>
                    </div>
                    <div class="mb-3">
                        <label for="nueva_contraseña" class="form-label">Nueva Contraseña</label>
                        <input type="password" class="form-control" id="nueva_contraseña" name="nueva_contraseña" required>
                    </div>
                    <div class="mb-3">
                        <label for="confirmar_contraseña" class="form-label">Confirmar Nueva Contraseña</label>
                        <input type="password" class="form-control" id="confirmar_contraseña" name="confirmar_contraseña" required>
                    </div>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-key"></i> Cambiar Contraseña
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
