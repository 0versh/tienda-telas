{% extends "base.html" %}

{% block title %}Mi Perfil{% endblock %}

{% block content %}
<div class="row mb-4 fade-in">
    <div class="col">
        <h1><i class="fas fa-user"></i> Mi Perfil</h1>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="glass-soft p-4">
            <h5 class="mb-3"><i class="fas fa-info-circle text-primary"></i> Información Personal</h5>
            <table class="table table-glass">
                <tr>
                    <th>Usuario:</th>
                    <td>{{ current_user.nombre_usuario }}</td>
                </tr>
                <tr>
                    <th>Nombre:</th>
                    <td>{{ current_user.nombre_completo }}</td>
                </tr>
                <tr>
                    <th>Email:</th>
                    <td>{{ current_user.email }}</td>
                </tr>
                <tr>
                    <th>Rol:</th>
                    <td><span class="badge-glass">{{ current_user.rol }}</span></td>
                </tr>
            </table>
        </div>
    </div>
    
    <div class="col-md-6 mb-4">
        <div class="glass-soft p-4">
            <h5 class="mb-3"><i class="fas fa-key text-warning"></i> Cambiar Contraseña</h5>
            <form method="POST" action="{{ url_for('auth.cambiar_contraseña') }}">
                <div class="mb-3">
                    <label for="contraseña_actual" class="form-label">Contraseña Actual</label>
                    <input type="password" class="form-control-glass" id="contraseña_actual" name="contraseña_actual" required>
                </div>
                <div class="mb-3">
                    <label for="nueva_contraseña" class="form-label">Nueva Contraseña</label>
                    <input type="password" class="form-control-glass" id="nueva_contraseña" name="nueva_contraseña" required>
                </div>
                <div class="mb-3">
                    <label for="confirmar_contraseña" class="form-label">Confirmar Contraseña</label>
                    <input type="password" class="form-control-glass" id="confirmar_contraseña" name="confirmar_contraseña" required>
                </div>
                <button type="submit" class="btn btn-glass">
                    <i class="fas fa-key"></i> Cambiar Contraseña
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
