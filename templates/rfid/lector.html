{% extends "base.html" %}

{% block title %}Lector RFID - Manual{% endblock %}

{% block content %}
<div class="row mb-4 fade-in">
    <div class="col">
        <h1><i class="fas fa-rss"></i> Lector RFID Manual</h1>
        <p class="text-muted">Ingresa el código RFID del rollo para consultar su información.</p>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="glass-soft p-4">
            <div class="mb-3">
                <label class="form-label fw-semibold">Código RFID</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent">🏷️</span>
                    <input type="text" class="form-glass" id="rfidCode" placeholder="RFID-00000001" autofocus>
                    <button class="btn btn-glass" id="btnConsultar">Consultar</button>
                </div>
            </div>
            <div id="infoRollo">
                <p class="text-muted text-center py-3">Ingresa un código y presiona "Consultar".</p>
            </div>
            <div class="mt-3 d-flex gap-2">
                <button class="btn btn-glass flex-grow-1" id="btnEntrada" disabled>
                    <i class="fas fa-arrow-down"></i> Registrar Entrada (Compra)
                </button>
                <button class="btn btn-glass flex-grow-1" id="btnSalida" disabled>
                    <i class="fas fa-arrow-up"></i> Registrar Salida (Venta)
                </button>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="glass-soft p-4">
            <h5><i class="fas fa-history text-info"></i> Últimas consultas</h5>
            <ul class="list-group mt-2" id="historialList" style="max-height: 350px; overflow-y: auto;">
                <li class="list-group-item bg-transparent text-muted text-center">No hay consultas recientes</li>
            </ul>
        </div>
    </div>
</div>

<script>
let ultimoRollo = null;
const rfidInput = document.getElementById('rfidCode');
const btnConsultar = document.getElementById('btnConsultar');
const btnEntrada = document.getElementById('btnEntrada');
const btnSalida = document.getElementById('btnSalida');
const infoDiv = document.getElementById('infoRollo');
const historialList = document.getElementById('historialList');

function agregarHistorial(codigo, nombre) {
    const li = document.createElement('li');
    li.className = 'list-group-item bg-transparent text-muted';
    li.innerHTML = `<code>${codigo}</code> – ${nombre} – ${new Date().toLocaleTimeString()}`;
    historialList.prepend(li);
    if (historialList.children.length > 10) historialList.removeChild(historialList.lastChild);
}

async function consultarRollo(codigo) {
    infoDiv.innerHTML = '<p class="text-muted text-center">Consultando...</p>';
    try {
        const resp = await fetch('/api/lectura-rfid', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ codigo_rfid: codigo })
        });
        const data = await resp.json();
        if (data.status === 'success') {
            ultimoRollo = data.data;
            infoDiv.innerHTML = `
                <div class="dashboard-card p-3">
                    <div><strong>🧵 Tela:</strong> ${ultimoRollo.nombre_tela}</div>
                    <div><strong>📏 Metros disponibles:</strong> ${ultimoRollo.metros_disponibles} m</div>
                    <div><strong>💰 Precio por metro:</strong> $${ultimoRollo.precio_metro}</div>
                    <div><strong>🆔 ID Rollo:</strong> ${ultimoRollo.id_rollo}</div>
                </div>
            `;
            btnEntrada.disabled = false;
            btnSalida.disabled = false;
            agregarHistorial(codigo, ultimoRollo.nombre_tela);
        } else {
            infoDiv.innerHTML = `<div class="alert alert-danger">❌ ${data.message}</div>`;
            btnEntrada.disabled = true;
            btnSalida.disabled = true;
            ultimoRollo = null;
        }
    } catch (error) {
        infoDiv.innerHTML = `<div class="alert alert-danger">❌ Error de conexión</div>`;
        btnEntrada.disabled = true;
        btnSalida.disabled = true;
    }
}

btnConsultar.onclick = () => {
    const codigo = rfidInput.value.trim();
    if (!codigo) return alert('Ingresa un código RFID');
    consultarRollo(codigo);
};
rfidInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') btnConsultar.click();
});

btnEntrada.onclick = () => {
    if (!ultimoRollo) return;
    let metros = prompt('Metros que ingresan (compra):', ultimoRollo.metros_disponibles);
    if (metros && parseFloat(metros) > 0) {
        window.location.href = `/compras/nueva?rfid=${encodeURIComponent(rfidInput.value)}&metros=${metros}&precio=${ultimoRollo.precio_metro}&id_rollo=${ultimoRollo.id_rollo}`;
    }
};

btnSalida.onclick = () => {
    if (!ultimoRollo) return;
    let metros = prompt('Metros a vender:', '1');
    if (metros && parseFloat(metros) > 0) {
        if (parseFloat(metros) > ultimoRollo.metros_disponibles) {
            alert(`Solo hay ${ultimoRollo.metros_disponibles} metros disponibles`);
            return;
        }
        window.location.href = `/ventas/nueva?rfid=${encodeURIComponent(rfidInput.value)}&metros=${metros}&precio=${ultimoRollo.precio_metro}&id_rollo=${ultimoRollo.id_rollo}`;
    }
};
</script>
{% endblock %}
