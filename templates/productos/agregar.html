{% extends "base.html" %}

{% block title %}Nuevo Producto{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h1><i class="fas fa-plus"></i> Nuevo Producto</h1>
    </div>
    <div class="col text-end">
        <a href="{{ url_for('productos.lista') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="codigo" class="form-label">Código *</label>
                    <input type="text" class="form-control" id="codigo" name="codigo" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="nombre" class="form-label">Nombre *</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="id_tipo" class="form-label">Tipo de Tela *</label>
                    <select class="form-select" id="id_tipo" name="id_tipo" required>
                        <option value="">Seleccione...</option>
                        {% for tipo in tipos %}
                        <option value="{{ tipo.id_tipo }}">{{ tipo.nombre_tipo }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="id_proveedor" class="form-label">Proveedor *</label>
                    <select class="form-select" id="id_proveedor" name="id_proveedor" required>
                        <option value="">Seleccione...</option>
                        {% for proveedor in proveedores %}
                        <option value="{{ proveedor.id_proveedor }}">{{ proveedor.nombre_proveedor }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="composicion" class="form-label">Composición</label>
                <input type="text" class="form-control" id="composicion" name="composicion" placeholder="Ej: 100% Algodón">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="ancho" class="form-label">Ancho (m)</label>
                    <input type="number" step="0.01" class="form-control" id="ancho" name="ancho">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="peso_gramaje" class="form-label">Peso (gr/m²)</label>
                    <input type="number" step="0.01" class="form-control" id="peso_gramaje" name="peso_gramaje">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="precio_compra" class="form-label">Precio Compra *</label>
                    <input type="number" step="0.01" class="form-control" id="precio_compra" name="precio_compra" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="precio_venta" class="form-label">Precio Venta *</label>
                    <input type="number" step="0.01" class="form-control" id="precio_venta" name="precio_venta" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="stock_minimo" class="form-label">Stock Mínimo *</label>
                    <input type="number" step="0.01" class="form-control" id="stock_minimo" name="stock_minimo" required>
                </div>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Guardar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
