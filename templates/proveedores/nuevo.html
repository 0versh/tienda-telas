{% extends "base.html" %}

{% block title %}Nuevo Proveedor{% endblock %}

{% block content %}
<div class="row mb-4 fade-in">
    <div class="col">
        <h1><i class="fas fa-truck-plus text-primary"></i> Nuevo Proveedor</h1>
        <p class="text-muted">Complete los datos del nuevo proveedor.</p>
    </div>
    <div class="col text-end">
        <a href="{{ url_for('proveedores.lista') }}" class="btn btn-glass">
            <i class="fas fa-arrow-left me-1"></i> Volver
        </a>
    </div>
</div>

<div class="glass-soft p-4">
    <form method="POST">
        <div class="row">
            <!-- Columna izquierda -->
            <div class="col-md-6">
                <div class="dashboard-card p-3 mb-4">
                    <h5 class="mb-3"><i class="fas fa-building text-primary"></i> Datos principales</h5>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-tag me-1 text-primary"></i> Nombre del Proveedor *
                        </label>
                        <input type="text" class="form-glass" name="nombre_proveedor" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user-tie me-1 text-primary"></i> Contacto
                            </label>
                            <input type="text" class="form-glass" name="contacto">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-phone-alt me-1 text-primary"></i> Teléfono
                            </label>
                            <input type="text" class="form-glass" name="telefono">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-envelope me-1 text-primary"></i> Email
                        </label>
                        <input type="email" class="form-glass" name="email">
                    </div>
                </div>
            </div>
            
            <!-- Columna derecha -->
            <div class="col-md-6">
                <div class="dashboard-card p-3 mb-4">
                    <h5 class="mb-3"><i class="fas fa-info-circle text-primary"></i> Información adicional</h5>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-tags me-1 text-primary"></i> Tipos de telas que suministra
                        </label>
                        <input type="text" class="form-glass" name="tipo_telas" placeholder="Ej: Algodón, Poliéster, Seda">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="fas fa-map-marker-alt me-1 text-primary"></i> Dirección
                        </label>
                        <textarea class="form-glass" name="direccion" rows="3"></textarea>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-end mt-2">
            <button type="submit" class="btn btn-glass px-5 py-2">
                <i class="fas fa-save me-2"></i> Guardar Proveedor
            </button>
        </div>
    </form>
</div>
{% endblock %}
